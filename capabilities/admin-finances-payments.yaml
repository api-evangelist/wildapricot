naftiko: 1.0.0-alpha2
info:
  label: WildApricot Admin API — Finances.Payments
  description: 'WildApricot Admin API — Finances.Payments. 10 operations. Lead operation: WildApricot Get List of Payments
    by Criteria.. Self-contained Naftiko capability covering one Wildapricot business surface.'
  tags:
  - Wildapricot
  - Finances.Payments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WILDAPRICOT_API_KEY: WILDAPRICOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-finances-payments
    baseUri: https://api.wildapricot.org/v2.2
    description: WildApricot Admin API — Finances.Payments business capability. Self-contained, no shared references.
    resources:
    - name: accounts-accountId-payments
      path: /accounts/{accountId}/payments
      operations:
      - name: getpaymentslist
        method: GET
        description: WildApricot Get List of Payments by Criteria.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contactId
          in: query
          type: integer
          description: Identifier of contact who made the payment.
        - name: eventId
          in: query
          type: integer
          description: Identifier of event. When specified API returns collection of payments settled to invoices associated
            with event registrations for the event.
        - name: idsOnly
          in: query
          type: boolean
          description: When set to true, API returns only collection of identifiers instead of collection of payments.
        - name: StartDate
          in: query
          type: string
          description: Limits result to payments created since StartDate.
        - name: EndDate
          in: query
          type: string
          description: Limits result to payments created before EndDate.
        - name: paimentType
          in: query
          type: string
          description: Limits result to payment type.
        - name: unsettledOnly
          in: query
          type: boolean
          description: When set to true, API returns only unsettled payments.
        - name: ids
          in: query
          type: string
          description: You can filter the payments by specifying a set of payment IDs.
      - name: createpayment
        method: POST
        description: WildApricot Creates a New Payment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: accounts-accountId-payments-donationId-AllocateRefundToDonation
      path: /accounts/{accountId}/payments/{donationId}/AllocateRefundToDonation
      operations:
      - name: allocaterefundtodonation
        method: POST
        description: WildApricot Allocate Refund to Specific Donation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: donationId
          in: path
          type: integer
          description: Unique donation identifier
          required: true
    - name: accounts-accountId-payments-donationId-UnallocateFromDonation
      path: /accounts/{accountId}/payments/{donationId}/UnallocateFromDonation
      operations:
      - name: unallocatefinancedocumentfromdonation
        method: POST
        description: WildApricot Unallocate Finance Document from Specific Donation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: donationId
          in: path
          type: integer
          description: Unique donation identifier
          required: true
    - name: accounts-accountId-payments-paymentId
      path: /accounts/{accountId}/payments/{paymentId}
      operations:
      - name: getpaymentdetails
        method: GET
        description: WildApricot Retrieve Information About Specific Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: paymentId
          in: path
          type: integer
          description: Unique payment identifier
          required: true
      - name: updatepayment
        method: PUT
        description: WildApricot Update Existing Payment Information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: paymentId
          in: path
          type: integer
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletepayment
        method: DELETE
        description: WildApricot Delete Existing Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: paymentId
          in: path
          type: integer
          required: true
    - name: accounts-accountId-payments-paymentId-AllocateInvoice
