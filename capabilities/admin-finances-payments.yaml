      - name: allocateinvoice
        method: POST
        description: WildApricot Allocate Invoice to Specific Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: paymentId
          in: path
          type: integer
          description: Unique payment identifier
          required: true
    - name: accounts-accountId-payments-paymentId-AllocateRefundToPayment
      path: /accounts/{accountId}/payments/{paymentId}/AllocateRefundToPayment
      operations:
      - name: allocaterefundtopayment
        method: POST
        description: WildApricot Allocate Refund to Specific Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: paymentId
          in: path
          type: integer
          description: Unique payment identifier
          required: true
    - name: accounts-accountId-payments-paymentId-UnallocateFromPayment
