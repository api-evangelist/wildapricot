        destructive: false
        idempotent: true
      call: admin-onlinestore-products.onlinestoreproductsgetlist
      with:
        $skip: tools.$skip
        $top: tools.$top
      outputParameters:
      - type: object
        mapping: $.
    - name: wildapricot-get-accounts-accountid-store-2
      description: WildApricot GET /accounts/{accountId}/store/products/{id}
      hints:
