naftiko: "1.0.0-alpha1"

info:
  label: "WildApricot Admin API"
  description: >-
    WildApricot Admin API providing membership management operations including
    contacts, events, registrations, membership levels, invoices, payments,
    donations, email campaigns, and store orders.
  tags:
    - WildApricot
    - Membership Management
    - Associations
    - Nonprofit
    - Events
    - Contacts
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WILDAPRICOT_API_KEY: WILDAPRICOT_API_KEY

capability:
  consumes:
    - type: http
      namespace: wildapricot-admin
      baseUri: https://api.wildapricot.org/v2.2
      description: "WildApricot Admin API for membership management."
      authentication:
        type: bearer
        token: "{{WILDAPRICOT_API_KEY}}"
      resources:
        - name: contacts
          path: /accounts/{accountId}/contacts
          description: "Contact and member management"
          operations:
            - name: list-contacts
              method: GET
              description: "List all contacts/members for an account"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "WildApricot account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-contact
              method: POST
              description: "Create a new contact/member"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "WildApricot account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  Email: "{{tools.email}}"
                  FirstName: "{{tools.firstName}}"
                  LastName: "{{tools.lastName}}"

        - name: contact
          path: /accounts/{accountId}/contacts/{contactId}
          description: "Single contact operations"
          operations:
            - name: get-contact
              method: GET
              description: "Get a contact by ID"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Account ID"
                - name: contactId
                  in: path
                  type: string
                  required: true
                  description: "Contact ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: events
          path: /accounts/{accountId}/events
          description: "Event management"
          operations:
            - name: list-events
              method: GET
              description: "List all events for an account"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-event
              method: POST
              description: "Create a new event"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  Name: "{{tools.name}}"
                  StartDate: "{{tools.startDate}}"

        - name: event-registrations
          path: /accounts/{accountId}/eventregistrations
          description: "Event registration management"
          operations:
            - name: list-registrations
              method: GET
              description: "List event registrations"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: membership-levels
          path: /accounts/{accountId}/membershiplevels
          description: "Membership level management"
          operations:
            - name: list-membership-levels
              method: GET
              description: "List all membership levels"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: invoices
          path: /accounts/{accountId}/invoices
          description: "Invoice management"
          operations:
            - name: list-invoices
              method: GET
              description: "List invoices for an account"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: payments
          path: /accounts/{accountId}/payments
          description: "Payment management"
          operations:
            - name: list-payments
              method: GET
              description: "List payments for an account"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: donations
          path: /accounts/{accountId}/donations
          description: "Donation management"
          operations:
            - name: list-donations
              method: GET
              description: "List donations for an account"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: wildapricot-admin-api
      resources:
        - path: /v1/contacts
          name: contacts
          description: "Member/contact management"
          operations:
            - method: GET
              name: list-contacts
              description: "List all contacts"
              call: "wildapricot-admin.list-contacts"
              with:
                accountId: "rest.accountId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/events
          name: events
          description: "Event management"
          operations:
            - method: GET
              name: list-events
              description: "List all events"
              call: "wildapricot-admin.list-events"
              with:
                accountId: "rest.accountId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/membership-levels
          name: membership-levels
          description: "Membership levels"
          operations:
            - method: GET
              name: list-membership-levels
              description: "List membership levels"
              call: "wildapricot-admin.list-membership-levels"
              with:
                accountId: "rest.accountId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: wildapricot-admin-mcp
      transport: http
      tools:
        - name: list-contacts
          description: "List contacts/members for a WildApricot account."
          hints:
            readOnly: true
            idempotent: true
          call: "wildapricot-admin.list-contacts"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-contact
          description: "Get a specific WildApricot contact/member by ID."
          hints:
            readOnly: true
            idempotent: true
          call: "wildapricot-admin.get-contact"
          with:
            accountId: "tools.accountId"
            contactId: "tools.contactId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-events
          description: "List events for a WildApricot account."
          hints:
            readOnly: true
            idempotent: true
          call: "wildapricot-admin.list-events"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-registrations
          description: "List event registrations for a WildApricot account."
          hints:
            readOnly: true
            idempotent: true
          call: "wildapricot-admin.list-registrations"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-membership-levels
          description: "List membership levels and their pricing for a WildApricot account."
          hints:
            readOnly: true
            idempotent: true
          call: "wildapricot-admin.list-membership-levels"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."
