naftiko: 1.0.0-alpha2
info:
  label: WildApricot Admin API — Finances.AuditLog
  description: 'WildApricot Admin API — Finances.AuditLog. 2 operations. Lead operation: WildApricot List of Audit Log Items..
    Self-contained Naftiko capability covering one Wildapricot business surface.'
  tags:
  - Wildapricot
  - Finances.AuditLog
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WILDAPRICOT_API_KEY: WILDAPRICOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-finances-auditlog
    baseUri: https://api.wildapricot.org/v2.2
    description: WildApricot Admin API — Finances.AuditLog business capability. Self-contained, no shared references.
    resources:
    - name: accounts-accountId-auditLogItems
      path: /accounts/{accountId}/auditLogItems
      operations:
      - name: getauditlogitems
        method: GET
        description: WildApricot List of Audit Log Items.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filterObjectType
          in: query
          type: string
          description: Kind of object for audit log filter
        - name: FilterObjectId
          in: query
          type: integer
          description: Unique identifyer of type filterObjectType
        - name: StartDate
          in: query
          type: string
          description: Limits result to log items created since StartDate.
        - name: EndDate
          in: query
          type: string
          description: Limits result to log items created before EndDate.
    - name: accounts-accountId-auditLogItems-itemId
      path: /accounts/{accountId}/auditLogItems/{itemId}
      operations:
      - name: getauditlogitem
        method: GET
        description: WildApricot Single Audit Log Item.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: itemId
          in: path
          type: integer
          description: Audit log item identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.WILDAPRICOT_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-finances-auditlog-rest
    port: 8080
    description: REST adapter for WildApricot Admin API — Finances.AuditLog. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/accounts/{accountid}/auditlogitems
      name: accounts-accountid-auditlogitems
      description: REST surface for accounts-accountId-auditLogItems.
      operations:
      - method: GET
        name: getauditlogitems
        description: WildApricot List of Audit Log Items.
        call: admin-finances-auditlog.getauditlogitems
        with:
          filterObjectType: rest.filterObjectType
          FilterObjectId: rest.FilterObjectId
          StartDate: rest.StartDate
          EndDate: rest.EndDate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountid}/auditlogitems/{itemid}
      name: accounts-accountid-auditlogitems-itemid
      description: REST surface for accounts-accountId-auditLogItems-itemId.
      operations:
      - method: GET
        name: getauditlogitem
        description: WildApricot Single Audit Log Item.
        call: admin-finances-auditlog.getauditlogitem
        with:
          itemId: rest.itemId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-finances-auditlog-mcp
    port: 9090
    transport: http
    description: MCP adapter for WildApricot Admin API — Finances.AuditLog. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: wildapricot-list-audit-log-items
      description: WildApricot List of Audit Log Items.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-finances-auditlog.getauditlogitems
      with:
        filterObjectType: tools.filterObjectType
        FilterObjectId: tools.FilterObjectId
        StartDate: tools.StartDate
        EndDate: tools.EndDate
      outputParameters:
      - type: object
        mapping: $.
    - name: wildapricot-single-audit-log-item
      description: WildApricot Single Audit Log Item.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-finances-auditlog.getauditlogitem
      with:
        itemId: tools.itemId
      outputParameters:
      - type: object
        mapping: $.
