naftiko: 1.0.0-alpha2
info:
  label: WildApricot Admin API — Pictures
  description: 'WildApricot Admin API — Pictures. 2 operations. Lead operation: WildApricot Upload Pictures. Self-contained
    Naftiko capability covering one Wildapricot business surface.'
  tags:
  - Wildapricot
  - Pictures
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WILDAPRICOT_API_KEY: WILDAPRICOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-pictures
    baseUri: https://api.wildapricot.org/v2.2
    description: WildApricot Admin API — Pictures business capability. Self-contained, no shared references.
    resources:
    - name: accounts-accountId-pictures
      path: /accounts/{accountId}/pictures
      operations:
      - name: uploadpicture
        method: POST
        description: WildApricot Upload Pictures
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: picture0
          in: formData
          type: file
          description: The uploaded picture0 data
          required: true
        - name: picture1
          in: formData
          type: file
          description: The uploaded picture1 data
    - name: accounts-accountId-pictures-pictureId
      path: /accounts/{accountId}/pictures/{pictureId}
      operations:
      - name: getpicturecontent
        method: GET
        description: WildApricot Download Picture
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pictureId
          in: path
          type: string
          description: Picture identifier
          required: true
        - name: fullSize
          in: query
          type: boolean
          description: Full size picture will be returned. If full size picture does not exist, thumbnail will be returned.
        - name: asBase64
          in: query
          type: boolean
          description: Base64 encoded image will be returned.
    authentication:
      type: bearer
      token: '{{env.WILDAPRICOT_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-pictures-rest
    port: 8080
    description: REST adapter for WildApricot Admin API — Pictures. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts/{accountid}/pictures
      name: accounts-accountid-pictures
      description: REST surface for accounts-accountId-pictures.
      operations:
      - method: POST
        name: uploadpicture
        description: WildApricot Upload Pictures
        call: admin-pictures.uploadpicture
        with:
          picture0: rest.picture0
          picture1: rest.picture1
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountid}/pictures/{pictureid}
      name: accounts-accountid-pictures-pictureid
      description: REST surface for accounts-accountId-pictures-pictureId.
      operations:
      - method: GET
        name: getpicturecontent
        description: WildApricot Download Picture
        call: admin-pictures.getpicturecontent
        with:
          pictureId: rest.pictureId
          fullSize: rest.fullSize
          asBase64: rest.asBase64
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-pictures-mcp
    port: 9090
    transport: http
    description: MCP adapter for WildApricot Admin API — Pictures. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: wildapricot-upload-pictures
      description: WildApricot Upload Pictures
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-pictures.uploadpicture
      with:
        picture0: tools.picture0
        picture1: tools.picture1
      outputParameters:
      - type: object
        mapping: $.
    - name: wildapricot-download-picture
      description: WildApricot Download Picture
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-pictures.getpicturecontent
      with:
        pictureId: tools.pictureId
        fullSize: tools.fullSize
        asBase64: tools.asBase64
      outputParameters:
      - type: object
        mapping: $.
