naftiko: 1.0.0-alpha2
info:
  label: WildApricot Admin API — Membership.Bundles
  description: 'WildApricot Admin API — Membership.Bundles. 2 operations. Lead operation: WildApricot Get List of Membership
    Bundles.. Self-contained Naftiko capability covering one Wildapricot business surface.'
  tags:
  - Wildapricot
  - Membership.Bundles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WILDAPRICOT_API_KEY: WILDAPRICOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-membership-bundles
    baseUri: https://api.wildapricot.org/v2.2
    description: WildApricot Admin API — Membership.Bundles business capability. Self-contained, no shared references.
    resources:
    - name: accounts-accountId-bundles
      path: /accounts/{accountId}/bundles
      operations:
      - name: getmembershipbundleslist
        method: GET
        description: WildApricot Get List of Membership Bundles.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: levelId
          in: query
          type: integer
          description: Provide this parameter to get only bundles related to specific membership level.
    - name: accounts-accountId-bundles-bundleId
      path: /accounts/{accountId}/bundles/{bundleId}
      operations:
      - name: getmembershipbundle
        method: GET
        description: WildApricot Get Membership Bundle Details.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bundleId
          in: path
          type: integer
          description: Unique bundle identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.WILDAPRICOT_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-membership-bundles-rest
    port: 8080
    description: REST adapter for WildApricot Admin API — Membership.Bundles. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/accounts/{accountid}/bundles
      name: accounts-accountid-bundles
      description: REST surface for accounts-accountId-bundles.
      operations:
      - method: GET
        name: getmembershipbundleslist
        description: WildApricot Get List of Membership Bundles.
        call: admin-membership-bundles.getmembershipbundleslist
        with:
          levelId: rest.levelId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountid}/bundles/{bundleid}
      name: accounts-accountid-bundles-bundleid
      description: REST surface for accounts-accountId-bundles-bundleId.
      operations:
      - method: GET
        name: getmembershipbundle
        description: WildApricot Get Membership Bundle Details.
        call: admin-membership-bundles.getmembershipbundle
        with:
          bundleId: rest.bundleId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-membership-bundles-mcp
    port: 9090
    transport: http
    description: MCP adapter for WildApricot Admin API — Membership.Bundles. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: wildapricot-get-list-membership-bundles
      description: WildApricot Get List of Membership Bundles.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-membership-bundles.getmembershipbundleslist
      with:
        levelId: tools.levelId
      outputParameters:
      - type: object
        mapping: $.
    - name: wildapricot-get-membership-bundle-details
      description: WildApricot Get Membership Bundle Details.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-membership-bundles.getmembershipbundle
      with:
        bundleId: tools.bundleId
      outputParameters:
      - type: object
        mapping: $.
