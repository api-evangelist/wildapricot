        - auto
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: OAuth2 authentication for WildApricot API
      flows:
        clientCredentials:
          tokenUrl: https://oauth.wildapricot.org/auth/token
          scopes:
            auto: Full API access
  schemas:
    Account:
      type: object
      description: Information about Wild Apricot account
      required:
      - Id
      - Name
      - PrimaryDomainName
      - ContactLimitInfo
      - Currency
      - Localization
      - SquareRegisterSettings
      properties:
        Id:
          type: integer
          description: Account unique identifier.
        Name:
          type: string
          description: The account name. This corresponds to the organization name as it appears on the Organization details screen.
        Url:
          $ref: '#/components/schemas/ResourceUrl'
        PrimaryDomainName:
          type: string
          description: The primary domain name for the account.
        IsFreeAccount:
          type: boolean
        Resources:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
          description: Collection of account-related resources.
        ContactLimitInfo:
          $ref: '#/components/schemas/ContactLimitInfo'
        TimeZone:
          $ref: '#/components/schemas/TimeZone'
        Currency:
          $ref: '#/components/schemas/Currency'
        Localization:
          $ref: '#/components/schemas/Localization'
        SquareRegisterSettings:
          $ref: '#/components/schemas/SquareRegisterSettings'
        PaymentSettings:
          $ref: '#/components/schemas/PaymentSettings'
        BillingPlan:
          $ref: '#/components/schemas/BillingPlan'
    BillingPlan:
      type: object
      description: Current account billing plan.
      properties:
        Name:
          type: string
          description: Billing plan name
        Price:
          type: number
          description: Monthly price
    ContactLimitInfo:
      type: object
      description: Details about limits on the number of contacts.
      properties:
        CurrentContactsCount:
          type: integer
          description: Number of contacts currently in database (archived excluded)
        BillingPlanContactsLimit:
          type: integer
          description: Maximum number of contacts allowed by billing plan.
    Currency:
      type: object
      properties:
        Code:
          type: string
          description: Currency code according to ISO4217
        Name:
          type: string
          description: Human-readable currency name
        Symbol:
          type: string
          description: Currency symbol like $ or â‚¬
    Feature:
      type: object
      title: Feature
      description: Information about specific feature availability
      properties:
        Id:
          type: string
          description: Feature identifier
        Allowed:
          type: boolean
          description: Indicates whether the feature is allowed
    Localization:
      type: object
      properties:
        DateFormat:
          type: string
          description: Date format like "d MMM yyyy"
        TimeFormat:
          type: string
          description: Time format like "h:mm tt"
    PaymentSettings:
      type: object
      properties:
        GeneralPaymentInstructions:
          type: string
          description: General payment instructions (shown on the Invoices & Payments page and Manual invoices)
        EventPaymentInstructions:
          type: string
          description: For event registrations (can be changed for each event)
        MembershipPaymentInstructions:
          type: string
          description: For membership applications, renewals and level changes
    SquareRegisterSettings:
      type: object
      required:
      - IntegrationEnabled
      description: Settings for Square Register integration, used for mobile app
      properties:
        IntegrationEnabled:
          type: boolean
          description: Is integration enabled in admin UI.
        ClientId:
          type: string
          description: (optional) Square client Id
    TimeZone:
      type: object
      description: Details about account time zone
      properties:
        ZoneId:
          type: string
          description: Time zone id, i.e. "Arabic Standard Time"
        Name:
          type: string
          description: Time zone name, i.e. "(UTC+03:00) Baghdad"
        UtcOffset:
          type: integer
          description: Offcet from UTC Time in minutes, i.e. "180"
    CreateEntityFieldParams:
      allOf:
      - $ref: '#/components/schemas/EntityFieldDescription'
      - type: object
        required:
        - FieldType
        properties:
          FieldType:
            $ref: '#/components/schemas/CustomFieldType'
    EditEntityFieldParams:
      allOf:
      - $ref: '#/components/schemas/EntityFieldDescription'
      - type: object
        required:
        - FieldType
        properties:
          FieldType:
            $ref: '#/components/schemas/CustomFieldType'
    EntityFieldDescription:
      type: object
      required:
      - FieldName
      - Description
      - AdminOnly
      properties:
        FieldName:
          type: string
          description: Field name title, could be displayed in user interface. Field name could be changed by account administrator.
        SystemCode:
          type: string
          description: System-defined code associated with field. It does not change even if FieldName is edited in admin backend.
        DisplayType:
          type: string
          description: Optional hint, which tells how to display and edit field. It appears for String and Choice fields.
        IsSystem:
          type: boolean
          description: Field is system-defined and could not be deleted. However, field name could be changed by account administrator.
        Description:
          type: string
          description: System-defined description of the field. Empty for custom fields.
        FieldInstructions:
          type: string
          description: Admin-defined comment for the field. Shown as a tip when members or visitors fill in forms.
        AllowedValues:
          type: array
          description: If field value is limited to set of predefined values, this contains list of allowed values. Normally, AllowedValues appear for MultipleChoice and Choice fields.
          items:
            $ref: '#/components/schemas/OptionsListItem'
        Order:
          type: integer
          description: Sorting order to display the field in UI
        RulesAndTermsInfo:
          $ref: '#/components/schemas/RulesAndTermsInfo'
    EntityFieldDescriptionWithExtraCharge:
      allOf:
      - $ref: '#/components/schemas/EditEntityFieldParams'
      - type: object
        required:
        - FieldType
        properties:
          ExtraCharge:
            $ref: '#/components/schemas/ExtraCharge'
    Error:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          description: Error code, like Validation / Search / ...
        message:
          type: string
          description: An explanation of why this error occured
        details:
          type: object
          description: More information about the error. Data structure is specific for each kind of error.
    FieldValue:
      type: object
      properties:
        FieldName:
          type: string
          description: Field title. Custom field names are defined by account adinistrator. System field names are predefined by Wild Apricot system.
        SystemCode:
          type: string
          description: The system code is a unique field identifier that can be used instead of the field name to identify the field. While field name could be changed by administrators, system codes 
            are defined by the system and cannot be changed.
        Value:
          type: object
          description: Field value could be an integer / string / date in ISO8601 format / boolean / an object consisting of Id and Label or array of such objects. The content format depends on custom
            field description.
    LinkedResource:
      type: object
      properties:
        Id:
          type: integer
          description: unique item identifier
        Url:
          type: string
          description: API url to get item details
    LinkedResourceWithName:
      allOf:
      - $ref: '#/components/schemas/LinkedResource'
      - type: object
        properties:
          Name:
            type: string
            description: Resource name
    Resource:
      type: object
      required:
      - Name
      - Url
      - AllowedOperations
      properties:
        Url:
          $ref: '#/components/schemas/ResourceUrl'
        Name:
          type: string
          description: Name of resource
        Description:
          type: string
          description: Text description of the resource
        AllowedOperations:
          type: array
          items:
            type: string
          description: "Collection of allowed operations for this resource. Possible values are\nGET - Resource can be requested\nPOST - Resource can be created\nPUT - Resource can be updated\nDELETE -
            Resource can be deleted\n"
    ResourceUrl:
      type: string
      description: Permanent resource URL in API.
    AttachmentData:
      type: object
      properties:
        Name:
          type: string
          description: attachment name
        MimeType:
          type: string
          description: http ContentType (MIME type)
        Data:
          type: object
          description: uploading file data
    AttachmentDataList:
      description: list of uploading files
      type: array
      items:
        $ref: '#/components/schemas/AttachmentData'
    Bundle:
      type: object
      properties:
        Id:
          type: integer
          description: Unique bundle identifier.
        Url:
          $ref: '#/components/schemas/ResourceUrl'
        Email:
          type: string
          description: Email of bundle administrator.
        ParticipantsCount:
          type: integer
          description: The number of members in the bundle.
        Administrator:
          allOf:
          - $ref: '#/components/schemas/LinkedResource'
          - description: Link to bundle administrator.
        MembershipLevel:
          allOf:
          - $ref: '#/components/schemas/LinkedResource'
          - description: Link to membership level related to this bundle.
        SpacesLeft:
          type: integer
          description: If bundle size is limited, then this field indicates number of vacant spaces left in the bundle.
        Members:
          type: array
          items:
            $ref: '#/components/schemas/LinkedResource'
          description: Collection of links to members of the bundle.
    Contact:
      type: object
      properties:
        Id:
          type: integer
          description: Unique contact identifier.
        Url:
          $ref: '#/components/schemas/ResourceUrl'
        FirstName:
          type: string
          description: Shortcut for custom field value with system code 'FirstName'
        LastName:
          type: string
          description: Shortcut for custom field value with system code 'LastName'
        Organization:
          type: string
          description: Shortcut for custom field value with system code 'Organization'
        Email:
          type: string
          description: Contact primary email, shortcut for custom field value with system code 'Email'. Should be unique in account.
        DisplayName:
          type: string
          description: Combination of names or organization or email. Value depends on presence of values. It could be used to display contact record on lists.
        ProfileLastUpdated:
          type: string
          format: date
          description: Timestamp of last contact details modification. Complies with ISO8601 format. The date and time that common fields, membership fields, or member group participation were last 
            updated for the contact.
        MembershipLevel:
          allOf:
          - $ref: '#/components/schemas/LinkedResourceWithName'
          - description: Information about current membership level assigned to the contact. If the contact is not a member, then the MembershipLevel field is not included in the results.
        MembershipEnabled:
          type: boolean
          description: Indicates whether the contact is a member. A value of false indicates that the contact is a not a member or is a suspended member.
        Status:
          type: string
          enum:
          - Active
          - Lapsed
          - PendingNew
          - PendingRenewal
          - PendingUpgrade
          description: The status of the contact's membership. The status is only included in the results if the contact is a member.
        IsAccountAdministrator:
          type: boolean
          description: Indicates if the contact is an account administrator.
        TermsOfUseAccepted:
          type: boolean
          description: Indicates if the contact already accepted Wild Apricot's terms of use.
        FieldValues:
          type: array
          description: For each custom field you have added to your Wild Apricot database, the name of the field, its system code, and its value for this contact are returned. The system code is a 
            unique field identifier that can be used instead of the field name to identify the field. As well, a number of system fields are returned. If a custom field is restricted to certain access
            levels, then CustomAccessLevel indicates the level to which the field is restricted. Possible values are AdminOnly, Member, and Public.
          items:
            $ref: '#/components/schemas/ContactFieldValue'
    contactExtendedMembershipInfo:
      type: object
      properties:
        Id:
          type: integer
          description: Unique contact identifier.
        Url:
          $ref: '#/components/schemas/ResourceUrl'
        FirstName:
          type: string
          description: Shortcut for custom field value with system code 'FirstName'
        LastName:
          type: string
          description: Shortcut for custom field value with system code 'LastName'
        Organization:
          type: string
          description: Shortcut for custom field value with system code 'Organization'
        Email:
          type: string
          description: Contact primary email, shortcut for custom field value with system code 'Email'. Should be unique in account.
        DisplayName:
          type: string
          description: Combination of names or organization or email. Value depends on presence of values. It could be used to display contact record on lists.
        ProfileLastUpdated:
          type: string
          format: date
          description: Timestamp of last contact details modification. Complies with ISO8601 format. The date and time that common fields, membership fields, or member group participation were last 
            updated for the contact.
        MembershipLevel:
          allOf:
          - $ref: '#/components/schemas/LinkedResourceWithName'
          - description: Information about current membership level assigned to the contact. If the contact is not a member, then the MembershipLevel field is not included in the results.
        MembershipEnabled:
          type: boolean
          description: Indicates whether the contact is a member. A value of false indicates that the contact is a not a member or is a suspended member.
        Status:
          type: string
          enum:
          - Active
          - Lapsed
          - PendingNew
          - PendingRenewal
          - PendingUpgrade
          description: The status of the contact's membership. The status is only included in the results if the contact is a member.
        ExtendedMembershipInfo:
          $ref: '#/components/schemas/ExtendedMembershipInfo'
        IsAccountAdministrator:
          type: boolean
          description: Indicates if the contact is an account administrator.
        TermsOfUseAccepted:
          type: boolean
          description: Indicates if the contact already accepted Wild Apricot's terms of use.
        FieldValues:
          type: array
          description: For each custom field you have added to your Wild Apricot database, the name of the field, its system code, and its value for this contact are returned. The system code is a 
            unique field identifier that can be used instead of the field name to identify the field. As well, a number of system fields are returned. If a custom field is restricted to certain access
            levels, then CustomAccessLevel indicates the level to which the field is restricted. Possible values are AdminOnly, Member, and Public.
          items:
            $ref: '#/components/schemas/ContactFieldValue'
    ContactFieldAccessLevel:
      type: string
      enum:
      - Public
      - Members
      - Nobody
      description: "\nIndicates who is allowed to view the field value. - **Public** - value is visible to anyone who has access to members directory - **Members** - value is visible only to members - **Nobody*
        - value is visible only to account administrators\n"
    ContactFieldDescription:
      allOf:
      - $ref: '#/components/schemas/EntityFieldDescriptionWithExtraCharge'
      - type: object
      - required:
        - Id
        - Type
        - Access
        - AdminOnly
        - MemberOnly
      - properties:
          Id:
            type: integer
            description: Unique field identifier.
          Access:
            $ref: '#/components/schemas/ContactFieldAccessLevel'
          AdminOnly:
            type: boolean
            description: Indicates that the field is accessible only by administrators.
          ExistsInLevels:
            type: array
            description: If field is defined for specific levels only, this contains list of membership levels.
            items:
              $ref: '#/components/schemas/LinkedResource'
          MemberAccess:
            $ref: '#/components/schemas/MemberFieldAccess'
          MemberOnly:
            type: boolean
            description: Indicates whether the field is a membership field.
          IsBuiltIn:
            type: boolean
            description: The field is a built-in system field, it cannot be edited or deleted.
          SupportSearch:
            type: boolean
            description: Indicates that this field can be used in $filter expression in contact search.
          IsEditable:
            type: boolean
            description: Indicates that the field's value can be changed with create/update requests. Otherwise value canâ€™t be edited through API. If non-editable field value is provided in 
              create/update contact request, the value is ignored by API.
          RulesAndTermsInfo:
            $ref: '#/components/schemas/RulesAndTermsInfo'
          RenewalPolicy:
            $ref: '#/components/schemas/RenewalPolicy'
          ProrateInApplication:
            type: boolean
            description: If the field has associated cost, this indicates if the cost should be prorated over a partial period of time.
          FieldType:
            $ref: '#/components/schemas/CustomFieldType'
    ContactFieldValue:
      allOf:
      - $ref: '#/components/schemas/FieldValue'
      - type: object
        properties:
          CustomAccessLevel:
            $ref: '#/components/schemas/ContactFieldAccessLevel'
    ContactIdsResponse:
      type: object
      properties:
        ContactIdentifiers:
          type: array
          items:
            type: integer
          description: List of contact identifiers that match request criteria. The field appears only if idsOnly parameter was passed in request.
    ContactsAsyncResponse:
      type: object
      properties:
        ResultId:
          type: string
          description: Unique result identifier.
        ResultUrl:
          type: string
          description: URL to check async result availability. We expect that client application will check this URL with some small delay (every 5 sec) until API returns a list of contacts or 
            ProcessingState==Failed.
        Requested:
          type: string
          format: datetime
          description: Date and time when the request was queued for processing.
        Processed:
          type: string
          format: datetime
          description: Date and time when the request was processed.
        ProcessingState:
          type: string
          enum:
          - Waiting
          - Processing
          - Complete
          - Failed
          description: 'Asynchronous request state. It starts from Waiting, then server process it. Request may end in one of final states: Complete or Failed.'
        InitialQuery:
          type: object
          properties:
            ObjectType:
              type: string
              description: Object type which was requested. In this case it is always Contact.
            FilterExpression:
              type: string
              description: Value of $filter parameter passed into API.
            SelectExpression:
              type: string
              description: Value of $select parameter passed into API.
            ReturnIds:
              type: boolean
              description: Indicates if client requested only a list of identifiers, instead of full list of contacts.
        ErrorDetails:
          type: string
          description: In case of error, provides description of error occured.
    ContactsCountResponse:
      type: object
      properties:
        Count:
          type: integer
          description: Number of contacts that match request criteria. This field appears only if $count parameter was passed in request.
    ContactsListResponse:
      type: object
      properties:
        Contacts:
          type: array
          items:
            $ref: '#/components/schemas/Contact'
          description: List of contacts that match request criteria.
    ContactsMe:
      type: object
      properties:
        Id:
          type: integer
          description: Contact unique identifier.
        Url:
          $ref: '#/components/schemas/ResourceUrl'
        DisplayName:
          type: string
          description: Combination of names or organization or email. Value depends on presence of values. It could be used to display contact record on lists.
        FirstName:
          type: string
          description: Shortcut for custom field value with system code 'FirstName'
        LastName:
          type: string
          description: Shortcut for custom field value with system code 'LastName'
        Email:
          type: string
          description: Contact primary email, shortcut for custom field value with system code 'Email'. Should be unique in account.
        Organization:
          type: string
          description: Shortcut for custom field value with system code 'Organization'
        Status:
          type: string
          enum:
          - Active
          - Lapsed
          - PendingNew
          - PendingRenewal
          - PendingUpgrade
          description: The status of the contact's membership. The status is only included in the results if the contact is a member.
        MembershipLevel:
          allOf:
          - $ref: '#/components/schemas/LinkedResourceWithName'
          - description: Information about current membership level assigned to the contact. If the contact is not a member, then the MembershipLevel field is not included in the results.
        IsAccountAdministrator:
          type: boolean
          description: Indicates if the contact is an account administrator.
        TermsOfUseAccepted:
          type: boolean
          description: Indicates if the contact already accepted Wild Apricot's terms of use.
    ContactsResponse:
      allOf:
      - $ref: '#/components/schemas/ContactsAsyncResponse'
      - $ref: '#/components/schemas/ContactIdsResponse'
      - $ref: '#/components/schemas/ContactsCountResponse'
      - $ref: '#/components/schemas/ContactsListResponse'
    CreateContactFieldParams:
      allOf:
      - $ref: '#/components/schemas/EditContactFieldParams'
      - type: object
        required:
        - FieldType
        properties:
          FieldType:
            type: string
            enum:
            - Text
            - MultilineText
            - MultipleChoice
            - MultipleChoiceWithExtraCharge
            - RadioButtons
            - RadioButtonsWithExtraCharge
            - Dropdown
            - Picture
            - RulesAndTerms
            - Date
            - ExtraChargeCalculation
            - SectionDivider
            description: Field data type.
          MemberOnly:
            type: boolean
            description: Indicates whether a field is available only to members.
    CreateContactParams:
      type: object
      properties:
        FirstName:
          type: string
          description: Shortcut for custom field with system code 'FirstName'
        LastName:
          type: string
          description: Shortcut for custom field with system code 'LastName'
        Organization:
          type: string
          description: Shortcut for custom field with system code 'Organization'
        Email:
          type: string
          description: Contact primary email, shortcut for custom field with system code 'Email'. Should be unique in account.
        MembershipLevel:
          type: object
          properties:
            Id:
              type: integer
              description: ID of membership level to assign.
        MembershipEnabled:
          type: boolean
          description: Indicates whether the contact has membership. False means that the contact is a not a member or the membership is suspended.
        Status:
          type: string
          enum:
          - Active
          - Lapsed
          - PendingNew
          - PendingRenewal
          - PendingUpgrade
          description: The status of the membership. The status is only included in the results if the contact is a member.
        Password:
          type: string
          description: New password to assign. If you don't want to change password, just skip this field.
        FieldValues:
          type: array
          description: An array of field values to assign to contact.
          items:
            $ref: '#/components/schemas/FieldValue'
        RecreateInvoice:
          type: boolean
          description: Indicates whether to create invoice is required. Default value is **TRUE**
    CustomFieldType:
      type: string
      enum:
      - String
      - DateTime
      - Boolean
      - Choice
      - MultipleChoice
      - Number
      - SectionDivider
      - CalculatedExtraCharge
      - Picture
      description: Custom field data type.
    EditContactFieldParams:
      type: object
      required:
      - FieldType
      - FieldName
      properties:
        FieldName:
          type: string
          description: New field name. Must be unique.
        IsRequired:
          type: boolean
          description: Indicates whether a field has to be filled before the form is submitted. This limitation affects member-facing functionality only, admin always can submit form even without 
            required fields.
        AdminOnly:
          type: boolean
          default: false
          description: Indicates that the field is accessible only by administrators.
        Access:
          $ref: '#/components/schemas/ContactFieldAccessLevel'
        FieldInstructions:
          type: string
          description: Shown as a tip when members or visitors fill in forms. Max length is 250 characters.
        Order:
          type: integer
          description: Sorting order to display the field in UI.
        AllowedValues:
          type: array
          description: List of allowed values for this field. This data is used for Choice and MultipleChoice fields, otherwise it will be ignored.
          items:
            $ref: '#/components/schemas/OptionsListItem'
        RulesAndTermsInfo:
          $ref: '#/components/schemas/RulesAndTermsInfo'
        ExistsInLevels:
          type: array
          description: Collection of membership levels where the field exists. If empty collection provided, it means the field would be available for all levels.
          items:
            type: object
            properties:
              Id:
                type: integer
                description: Id of membership level
        MemberAccess:
          $ref: '#/components/schemas/MemberFieldAccess'
        RenewalPolicy:
          $ref: '#/components/schemas/RenewalPolicy'
        ProrateInApplication:
          type: boolean
          description: Whether the cost should be prorated over a partial period of time. Used only by fields with an associated cost.
        ExtraCharge:
          $ref: '#/components/schemas/ExtraCharge'
    ExtendedMembershipInfo:
      type: object
      description: 'Readonly object '
      properties:
        PendingMembershipOrderStatusType:
          type: string
          enum:
          - Invisible
          - PendingNoCorrespondingInvoice
          - PendingNotPaidYet
          - InvoicePaidManualApprovalRequired
          - FreeOrderManualApprovalRequired
          - InvoiceNotPaidButOperationApproved
          - MultipleInvoiceNotPaidMemberActivated
          - MultipleInvoiceNotPaidMemberPending
        PendingMembershipInvoice:
          allOf:
          - $ref: '#/components/schemas/LinkedResource'
          - description: Link to unpaid invoice, related to pending membership application.
        AllowedActions:
          type: array
          description: List of allowed actions related to contact. Each action is described with title and URL, which should be used in POST request.
          items:
            $ref: '#/components/schemas/LinkedResourceWithName'
    ExtraCharge:
      type: object
      title: ExtraChargeOptions
      description: This property appears for CalculatedExtraCharge fields only.
      required:
      - MultiplierType
      - Multiplier
      properties:
        MultiplierType:
          type: string
          description: "Indicates the type of multiplier field.\n  ItemPrice multiplier specifies a price for each requested item.\n  Percentage multiplier specifies a percent of field value to use as extra
            charge.\n"
          enum:
          - ItemPrice
          - Percentage
        Multiplier:
          type: number
          format: decimal
          description: value of multiplier for extra charge calculation
        MinAmount:
          type: integer
          description: Minimal amount of items to request (minimal field value). For ItemPrice multiplier type only.
        MaxAmount:
          type: integer
          description: Maximum amount of items to request (maximum field value). For ItemPrice multiplier type only.
        MinCharge:
          type: number
          format: decimal
          description: Minimal extra charge. (minimal field value). For Percentage multiplier type only.
        MaxCharge:
          type: number
          format: decimal
          description: Maximum extra charge. (maximum field value). For Percentage multiplier type only.
    FileInfo:
      type: object
      properties:
        Id:
          type: integer
          description: Unique attachment identifier
        Name:
          type: string
          description: attachment name
        ContentType:
          type: string
          description: http ContentType (MIME type)
        Size:
          type: integer
          description: File size
        CreatedDate:
          type: string
          format: datetime
          description: Date and time when the file has been uploaded.
    MemberFieldAccess:
      type: string
      title: MemberAccess
      enum:
      - EditInProfileAndInApplicationForm
      - EditInProfile
      - EditInApplicationForm
      - ViewOnly
      - Nobody
      description: Controls whether the member is allowed to view or modify this field. Only for member fields.
    MembershipGroupListItem:
      type: object
      properties:
        Id:
          type: integer
          description: Unique group identifier
        Name:
          type: string
          description: group name
        Description:
          type: string
          description: group description
    MembershipGroup:
      allOf:
      - $ref: '#/components/schemas/MembershipGroupListItem'
      - type: object
        properties:
