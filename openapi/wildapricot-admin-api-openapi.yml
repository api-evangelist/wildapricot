openapi: 3.0.3
info:
  title: WildApricot Admin API
  description: The WildApricot Admin API provides programmatic access to membership management features including contacts, events, event registrations, membership levels, invoices, payments, 
    donations, email campaigns, and store orders. Authentication uses OAuth2 with client credentials or authorization code flow.
  version: 7.24.0
  contact:
    name: WildApricot Support
    url: https://gethelp.wildapricot.com/
  license:
    name: Proprietary
  x-generated-from: documentation
servers:
- url: https://api.wildapricot.org/v2.2
  description: WildApricot Admin API v2.2
tags:
- name: Accounts
  description: Account management operations
- name: Contacts
  description: Contact/member management
- name: Events
  description: Event and registration management
- name: Membership
  description: Membership levels, groups and bundles
- name: Payments
  description: Invoices, payments, refunds and donations
- name: Email
  description: Email drafts and sending
- name: Store
  description: Store orders and products
- name: Audit
  description: Audit log operations
paths:
