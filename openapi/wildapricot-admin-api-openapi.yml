      - name: $async
        in: query
        required: false
        description: "\nControls whether the API call is perform asynchronously. Default value if true.\n"
        schema:
          type: boolean
      - name: resultId
        in: query
        required: false
        description: "\nThis parameter is used on a second step of asynchronous search. It should equal to the value of ResultId in response to the first step of asynchronous search.\n"
        schema:
          type: string
      - name: $filter
        in: query
        required: false
        description: "\nFilters the results of the Events API call so that only those records that match the filter criteria are included.\nThe following filter criterias are supported:\n\n  - Id, Supported
          operations: in.\n  - RegistrationEnabled, Supported operations: eq, ne.\n  - IsUpcoming, Supported operations: eq, ne.\n  - Tags, Supported operations: in.\n  - StartDate, Supported operations:
          eq, ne, gt, ge, lt, le.\n  - EndDate, Supported operations: eq, ne, gt, ge, lt, le.\n  - Name, Supported operations: eq, ne, substringof.\n  - TextIndex, Supported operations: substringof.\n"
        schema:
          type: string
      - name: $sort
        in: query
        required: false
        description: "\nThis parameter can be used to sort list of IDs or list of events. Possible values are\n\n  - ByStartDate asc - sort events by their Start date. Ascending order.\n  - ByStartDate
          desc - sort events by their Start date. Descending order.\n  - ByStartSession asc - sort events by start of their sessions (if exists). All past events ignored\n\n  Example: $sort=ByStartDate
          asc"
        schema:
          type: string
      - name: ''
        in: query
        required: false
        description: ''
        schema:
          type: string
      - name: ''
        in: query
        required: false
        description: ''
        schema:
          type: string
      - name: $count
        in: query
        required: false
        description: "\nSpecifies that result should contain only a total number of records matching criteria. Requests with specified $count parameter are always processed as synchronous.\n"
        schema:
          type: boolean
      - name: idsOnly
        in: query
        required: false
        description: "\nWhen idsOnly specified, the API returns only a list of identifiers matching criteria.\n"
        schema:
          type: boolean
      responses:
        '200':
          description: A wrapper object, which contains a list of events, event identifiers or events count.
