        Availability:
          $ref: '#/components/schemas/EventRegistrationTypeAvailability'
        RegistrationCode:
          type: string
          description: Registration code required to apply for event with this registration type. This property has value only if Availability is CodeRequired.
        AvailableForMembershipLevels:
          type: array
          items:
            $ref: '#/components/schemas/LinkedResource'
          description: Which membership levels can apply for event. This property has value only if Availability is MembersOnly.
        AvailableFrom:
          type: string
          format: datetime
          description: "This registration type is available starting from this date. Can be null. âš  Once set, it has to be provided on every update. Otherwise, it will be overwritten to null\n"
        AvailableThrough:
          type: string
          format: datetime
          description: "This registration type is available until this date. Can be null. âš  Once set, it has to be provided on every update. Otherwise, it will be overwritten to null\n"
        MaximumRegistrantsCount:
          type: integer
