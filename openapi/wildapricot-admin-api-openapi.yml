  /accounts/{accountId}/contacts:
    get:
      operationId: GetContactsList
      summary: WildApricot Contacts List
      description: "\nContacts search can be executed in synchronous and asynchronous manner. It depends on $async query string parameters.\n  # Synchronous call\n  When API call is processing synchronously,
        then response is just an array of contacts.\n  To make a synchronous contacts search, client application should make a request with query string parameter **$async=false**.\n\n  `GET https://api.wildapricot.org/v2/accounts/{account_id}/contacts?$async=false&OTHER_QUERY_PARAMS`\n\
        \n  # Asynchronous call\n  Contacts search is processed asynchronously by default. So if client application specifies $async=true, or does not specify this parameter at all, the request is processed
        as described below. In this case contacts search is a two-step action.\n  - **Search request**. Client specifies search conditions and receives resultId. See $filter and $select parameters for filtering.\n\
        \  - **Retrieve result**. Client passes resultId and receives request processing status and contacts list if request is already processed\n\n![async contact search diagramm](http://localhost:8019/Content/swagger/WAFiles/ContactListAsyncCall.png)\n"
      tags:
      - Contacts
      parameters:
      - name: ''
        in: query
        required: false
        description: ''
        schema:
          type: string
      - name: $async
        in: query
        required: false
        description: "\nControls whether the API call is perform asynchronously. Default value if true.\n"
        schema:
          type: boolean
      - name: resultId
        in: query
        required: false
        description: "\nThis parameter is used on a second step of asynchronous search. It should equal to the value of ResultId in response to the first step of asynchronous search.\n"
        schema:
          type: string
      - name: $filter
        in: query
        required: false
        description: "\nFilters the results of the Contacts API call so that only those records that match the filter criteria are included.\nSee [Filtering the results](http://gethelp.wildapricot.com/en/articles/502#filtering)
          for details.\n"
        schema:
          type: string
      - name: $select
        in: query
        required: false
        description: "Controls which fields are returned in the Contacts API call.  The field names correspond to the fields returned by the [ContactFields API call](#/Contacts.CustomFields/GetContactFieldDefinitions),
          not the field names that appear in Wild Apricot. Multiple field names are separated by commas, and field names with spaces or special characters are enclosed in single quotation marks.\n"
        schema:
          type: string
      - name: $sort
        in: query
        required: false
        description: "\nOrdering expression. There are 2 sorting options - **Name** and  **MemberSince**. And also 2 direction modifiers - **asc** and **desc**.\n---\nExample of valid expression - MemberSince
          asc\n"
        schema:
          type: string
      - name: simpleQuery
        in: query
        required: false
        description: "\nsimpleQuery is a parameter which allows you to search for contacts by matching a substring in first name, last name, organization, email or phone. This is simpler than using $filter
          parameter. \n"
        schema:
          type: string
      - name: ''
        in: query
        required: false
        description: ''
        schema:
          type: string
      - name: ''
        in: query
        required: false
        description: ''
        schema:
          type: string
      - name: $count
        in: query
        required: false
        description: "\nSpecifies that the result should contain only a total number of records matching criteria. Requests with specified $count parameter are always processed as synchronous.\n"
        schema:
          type: boolean
      - name: idsOnly
        in: query
        required: false
        description: "\nWhen idsOnly specified, the API returns only a list of identifiers matching criteria.\n"
        schema:
          type: boolean
      responses:
        '200':
          description: A wrapper object, which contains a list of contacts, contact identifiers, contacts count or information about asynchronous search request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactsResponse'
        '400':
          description: ''
        '401':
          description: ''
        '429':
          description: ''
      security:
      - OAuth2:
        - auto
    post:
      operationId: CreateContact
      summary: WildApricot Create a New Contact or Member Record
      description: ''
      tags:
      - Contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContactParams'
      parameters:
      - name: ''
        in: query
        required: false
        description: ''
        schema:
